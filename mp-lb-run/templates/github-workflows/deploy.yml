name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_NAME: {{PROJECT_NAME}}
  GCP_REGION: {{GCP_REGION}}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Decrypt secrets
        run: |
          test -f secrets.enc.json
          echo "Decrypt secrets.enc.json here using the project's chosen decrypt command."
          echo "The command should use one CI secret and write secrets.json."

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.GCP_PROJECT_ID }}-terraform-state" \
            -backend-config="prefix=terraform/state/${{ env.PROJECT_NAME }}"

      - name: Create Artifact Registry
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -target=google_artifact_registry_repository.backend \
            -var="gcp_project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="vercel_api_token=${{ secrets.VERCEL_API_TOKEN }}" \
            -var="cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -var="cloudflare_zone_id=${{ secrets.CLOUDFLARE_ZONE_ID }}"

{{BACKEND_IMAGE_STEPS}}

      - name: Build runtime Terraform vars
        run: node scripts/build-runtime-tfvars.mjs

      - name: Terraform apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="gcp_project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="vercel_api_token=${{ secrets.VERCEL_API_TOKEN }}" \
            -var="cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -var="cloudflare_zone_id=${{ secrets.CLOUDFLARE_ZONE_ID }}"

{{FRONTEND_DEPLOY_STEPS}}

      - name: Outputs
        working-directory: terraform
        run: terraform output
