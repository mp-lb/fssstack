project: fssstack
env_files:
  - .env.local
  - .env
homepage: http://localhost:${PORT}
ports: [PORT]
native:
  website:
    cmd: pnpm dev:next
    env: "*"
tasks:
  setup:
    cmds:
      - pnpm install
  lint:
    cmds:
      - 'test -n "{{REST}}" || (echo "usage: zap t lint -- <file...>" >&2; exit 1)'
      - pnpm exec eslint {{REST}}
  build:
    cmds:
      - pnpm build
  check_docs:
    cmds:
      - pnpm check:docs
  worktree_setup:
    cmds:
      - pnpm install
