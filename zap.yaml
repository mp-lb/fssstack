project: stackforge
env-files:
  - flatpack-shell/.env.local
  - flatpack-shell/.env
homepage: http://localhost:${EXAMPLE_BACKEND_PORT}/health
ports:
  - EXAMPLE_BACKEND_PORT
native:
  example-backend:
    cmd: pnpm -C flatpack-shell --filter @example/fss-shell-example-backend dev
    env: "*"
tasks:
  setup:
    cmds:
      - pnpm -C flatpack-shell install
  worktree-setup:
    cmds:
      - pnpm -C flatpack-shell install
