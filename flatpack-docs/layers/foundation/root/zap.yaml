project: __PROJECT_SLUG__
env_files:
  - .env.local
  - .env
homepage: http://localhost:${FRONTEND_PORT}
ports: [BACKEND_PORT, FRONTEND_PORT]
native:
  backend:
    cmd: pnpm --filter=__PACKAGE_PREFIX__-backend dev
    env: "*"
  frontend:
    cmd: pnpm --filter=__PACKAGE_PREFIX__-frontend dev
    env: "*"
tasks:
  setup:
    cmds:
      - pnpm install
  lint:
    cmds:
      - 'test -n "{{REST}}" || (echo "You must specify changed files." >&2; exit 1)'
      - pnpm exec eslint {{REST}}
  typecheck:
    cmds:
      - 'test -n "{{REST}}" || (echo "You must specify changed apps/packages." >&2; exit 1)'
      - |
        for path in {{REST}}; do
          pnpm --dir "$path" run typecheck
        done
  build:
    cmds:
      - pnpm turbo run build
  test:
    aliases: [vitest]
    cmds:
      - pnpm test
  worktree_setup:
    cmds:
      - pnpm install
