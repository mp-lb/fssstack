name: Release Desktop

on:
  push:
    branches:
      - main
    paths:
      - apps/desktop/package.json
      - apps/desktop/CHANGELOG.md
  workflow_dispatch:

permissions:
  contents: write

env:
  DESKTOP_RELEASE_REPOSITORY: mp-lb/doctrine

jobs:
  desktop-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -p "require('./apps/desktop/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=desktop-v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepare release tag
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"

          if gh release view "$TAG" --repo "$DESKTOP_RELEASE_REPOSITORY" --json isDraft --jq .isDraft >/tmp/release-is-draft.txt 2>/dev/null; then
            if [ "$(cat /tmp/release-is-draft.txt)" = "true" ]; then
              echo "Deleting existing draft release so this run can replace its artifacts: $TAG"
              gh release delete "$TAG" --repo "$DESKTOP_RELEASE_REPOSITORY" --cleanup-tag --yes
              exit 0
            fi

            echo "::error title=Desktop version already released::Release $TAG is already published. Create and merge a Changesets version PR before running the desktop release again."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  desktop-build:
    needs: desktop-version
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Load production and desktop signing secrets
        env:
          SECRETS_KEY: ${{ secrets.SECRETS_KEY }}
        run: |
          if [ -z "$SECRETS_KEY" ]; then
            echo "::error::SECRETS_KEY secret is empty or not set"
            exit 1
          fi

          npx -y @mp-lb/doctrine-secrets decrypt docs/secrets.json.enc --secret "$SECRETS_KEY" > secrets.json
          node scripts/load-deployment-env.mjs --skip-required

      - name: Validate desktop signing secrets
        run: |
          set -euo pipefail
          REQUIRED_VARS=(
            CSC_LINK
            CSC_KEY_PASSWORD
            APPLE_ID
            APPLE_APP_SPECIFIC_PASSWORD
            APPLE_TEAM_ID
          )

          for VAR in "${REQUIRED_VARS[@]}"; do
            if [ -z "${!VAR:-}" ]; then
              echo "::error::$VAR is required for signed desktop releases"
              exit 1
            fi
          done

      - name: Build desktop app
        run: pnpm --filter=@maplab-oss/hyperstore-desktop build

      - name: Package Doctrine Desktop
        working-directory: apps/desktop
        run: pnpm exec electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify packaged desktop artifacts
        run: |
          set -euo pipefail
          OUT_DIR="apps/desktop/out"
          MANIFEST_PATH="$OUT_DIR/latest-mac.yml"

          test -f "$MANIFEST_PATH"

          ZIP_PATH="$(ls -1 "$OUT_DIR"/*-mac.zip | head -n 1)"
          DMG_PATH="$(ls -1 "$OUT_DIR"/*.dmg | head -n 1)"

          test -f "$ZIP_PATH"
          test -f "$DMG_PATH"

          ZIP_NAME="$(basename "$ZIP_PATH")"
          DMG_NAME="$(basename "$DMG_PATH")"

          grep -q "$ZIP_NAME" "$MANIFEST_PATH"
          grep -q "$DMG_NAME" "$MANIFEST_PATH"

          APP_ASAR_PATH="$(find "$OUT_DIR" -path '*.app/Contents/Resources/app.asar' | head -n 1)"
          test -f "$APP_ASAR_PATH"

          APP_PATH="$(dirname "$(dirname "$(dirname "$APP_ASAR_PATH")")")"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          spctl --assess --type execute --verbose "$APP_PATH"

          npx --yes @electron/asar list "$APP_ASAR_PATH" > /tmp/doctrine-asar-list.txt
          grep -q '^/dist/main.js$' /tmp/doctrine-asar-list.txt
          grep -q '^/dist/preload.js$' /tmp/doctrine-asar-list.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.desktop-version.outputs.tag }}
          name: Doctrine Desktop v${{ needs.desktop-version.outputs.version }}
          draft: false
          repository: ${{ env.DESKTOP_RELEASE_REPOSITORY }}
          files: |
            apps/desktop/out/*.dmg
            apps/desktop/out/*.zip
            apps/desktop/out/*.yml
          fail_on_unmatched_files: true
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
