name: macOS App Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing or new GitHub Release tag, for example v0.15.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release-asset:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm --filter @mp-lb/zapper build

      - name: Load production and desktop signing secrets
        env:
          SECRETS_KEY: ${{ secrets.SECRETS_KEY }}
        run: |
          set -euo pipefail
          secrets_file="$RUNNER_TEMP/zapper-secrets.txt"
          npx -y @mp-lb/doctrine-secrets decrypt docs/secrets.txt.enc --secret "$SECRETS_KEY" > "$secrets_file"

          set -a
          source .env.production
          set +a

          write_env() {
            local name="$1"
            local value="${!name:-}"

            if [ -n "$value" ]; then
              echo "::add-mask::$value"
            fi

            {
              echo "$name<<__ZAPPER_ENV__"
              printf '%s\n' "$value"
              echo "__ZAPPER_ENV__"
            } >> "$GITHUB_ENV"
          }

          SECRETS_FILE="$secrets_file" node <<'NODE'
          const fs = require("fs");
          const file = process.env.SECRETS_FILE;
          const githubEnv = process.env.GITHUB_ENV;
          const content = fs.readFileSync(file, "utf8");

          function parseSecrets(text) {
            const trimmed = text.trim();
            if (!trimmed) return {};
            if (trimmed.startsWith("{")) return JSON.parse(trimmed);

            const values = {};
            for (const rawLine of text.split(/\r?\n/)) {
              const line = rawLine.trim();
              if (!line || line.startsWith("#")) continue;

              const match = line.match(/^([A-Z0-9_]+)\s*(=|:)\s*(.*)$/);
              if (!match) {
                throw new Error(`Invalid secrets line for key export: ${rawLine}`);
              }

              const [, key, , rawValue] = match;
              values[key] = rawValue.replace(/^"(.*)"$/, "$1");
            }
            return values;
          }

          for (const [key, rawValue] of Object.entries(parseSecrets(content))) {
            if (!/^[A-Z0-9_]+$/.test(key)) {
              throw new Error(`Invalid secret key: ${key}`);
            }
            const value = typeof rawValue === "string" ? rawValue : JSON.stringify(rawValue);
            if (value) console.log(`::add-mask::${value}`);

            fs.appendFileSync(
              githubEnv,
              `${key}<<__ZAPPER_SECRET_${key}__\n${value}\n__ZAPPER_SECRET_${key}__\n`,
            );
          }
          NODE

          for name in CSC_LINK APPLE_ID APPLE_TEAM_ID; do
            write_env "$name"
          done

      - name: Validate desktop signing secrets
        run: |
          set -euo pipefail
          missing=0
          for name in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for signed macOS release builds"
              missing=1
            fi
          done
          exit "$missing"

      - name: Import code signing certificate
        run: |
          set -euo pipefail

          keychain_password="$(uuidgen)"
          keychain_path="$RUNNER_TEMP/zapper-signing.keychain-db"
          certificate_path="$RUNNER_TEMP/zapper-signing.p12"

          if [[ "$CSC_LINK" == https://* || "$CSC_LINK" == http://* ]]; then
            curl -fsSL "$CSC_LINK" -o "$certificate_path"
          elif [ -f "$CSC_LINK" ]; then
            cp "$CSC_LINK" "$certificate_path"
          else
            csc_payload="${CSC_LINK#data:application/x-pkcs12;base64,}"
            csc_payload="${csc_payload#data:application/octet-stream;base64,}"
            if ! printf '%s' "$csc_payload" | base64 --decode > "$certificate_path" 2>/dev/null; then
              printf '%s' "$csc_payload" | base64 -D > "$certificate_path"
            fi
          fi

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -P "$CSC_KEY_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | sed 's/[ "]//g')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

          codesign_identity="$(
            security find-identity -v -p codesigning "$keychain_path" \
              | sed -n 's/.*"\(Developer ID Application:.*\)".*/\1/p' \
              | head -n 1
          )"
          if [ -z "$codesign_identity" ]; then
            echo "::error::No Developer ID Application identity found in CSC_LINK"
            exit 1
          fi

          echo "MACOS_SIGNING_KEYCHAIN=$keychain_path" >> "$GITHUB_ENV"
          echo "CODESIGN_IDENTITY=$codesign_identity" >> "$GITHUB_ENV"

      - name: Build signed app
        env:
          CODESIGN_OPTIONS: runtime
        run: apps/macos/bin/build

      - name: Verify signed app
        run: |
          codesign --verify --deep --strict --verbose=2 apps/macos/build/Zapper.app
          codesign --display --verbose=4 apps/macos/build/Zapper.app

      - name: Package app
        id: package
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${{ inputs.release_tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [ -z "$tag" ]; then
            echo "Release tag is required" >&2
            exit 1
          fi

          notarization_zip="$RUNNER_TEMP/Zapper-notarization.zip"
          ditto -c -k --keepParent apps/macos/build/Zapper.app "$notarization_zip"
          xcrun notarytool submit "$notarization_zip" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple apps/macos/build/Zapper.app
          xcrun stapler validate apps/macos/build/Zapper.app

          archive_name="Zapper-${tag}-macOS.zip"
          stable_archive_name="Zapper-macOS.zip"
          ditto -c -k --keepParent apps/macos/build/Zapper.app "$archive_name"
          cp "$archive_name" "$stable_archive_name"

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "archive_name=$archive_name" >> "$GITHUB_OUTPUT"
          echo "stable_archive_name=$stable_archive_name" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.archive_name }}
          path: |
            ${{ steps.package.outputs.archive_name }}
            ${{ steps.package.outputs.stable_archive_name }}

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.package.outputs.tag }}
          ARCHIVE_NAME: ${{ steps.package.outputs.archive_name }}
          STABLE_ARCHIVE_NAME: ${{ steps.package.outputs.stable_archive_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$ARCHIVE_NAME" "$STABLE_ARCHIVE_NAME" --clobber
          else
            gh release create "$TAG_NAME" "$ARCHIVE_NAME" "$STABLE_ARCHIVE_NAME" \
              --title "$TAG_NAME" \
              --generate-notes
          fi

      - name: Delete signing keychain
        if: always()
        run: |
          if [ -n "${MACOS_SIGNING_KEYCHAIN:-}" ]; then
            security delete-keychain "$MACOS_SIGNING_KEYCHAIN" || true
          fi
