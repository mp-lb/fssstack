project: fss-shell
env_files:
  - .env.local
  - .env
homepage: http://localhost:${EXAMPLE_BACKEND_PORT}/health
ports:
  - EXAMPLE_BACKEND_PORT
native:
  example-backend:
    cmd: pnpm --filter @example/fss-shell-example-backend dev
    env: "*"
tasks:
  setup:
    cmds:
      - pnpm install
  build:
    cmds:
      - pnpm build
  typecheck:
    cmds:
      - pnpm typecheck
  test:
    cmds:
      - pnpm test
  worktree_setup:
    cmds:
      - pnpm install
      - cp "$(dirname "$(git rev-parse --path-format=absolute --git-common-dir)")/.env" . 2>/dev/null || true
      - grep -qxF '@AGENTS_WORKTREE.md' AGENTS.md || printf '\n@AGENTS_WORKTREE.md\n' >> AGENTS.md
