name: CD - Build and Submit

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  continuous-deploy:
    runs-on: ubuntu-latest
    outputs:
      needs-build: ${{ steps.check-build.outputs.needs-build }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Publish OTA update
        id: update
        run: eas update --channel production --message "${{ github.event.head_commit.message || 'Manual production update' }}" --non-interactive
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
          EXPO_PUBLIC_APP_ENV: production
        continue-on-error: true

      - name: Check if binary build is needed
        id: check-build
        run: |
          if [ "${{ steps.update.outcome }}" != "success" ]; then
            echo "needs-build=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs-build=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-submit:
    needs: continuous-deploy
    if: needs.continuous-deploy.outputs.needs-build == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [ios, android]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Build and submit ${{ matrix.platform }}
        run: eas build --platform ${{ matrix.platform }} --profile production --non-interactive --auto-submit
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
          EXPO_PUBLIC_APP_ENV: production
