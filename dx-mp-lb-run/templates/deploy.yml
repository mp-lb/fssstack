name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_NAME: {{PROJECT_NAME}}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Decrypt secrets
        env:
          SECRETS_KEY: ${{ secrets.SECRETS_KEY }}
        run: |
          npx -y @mp-lb/doctrine-secrets decrypt secrets.json.enc --secret "$SECRETS_KEY" > secrets.json

      - name: Load deployment env
        id: deployment-env
        run: node scripts/load-deployment-env.mjs

      - uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate gcloud
        run: gcloud auth activate-service-account --key-file="$GOOGLE_APPLICATION_CREDENTIALS"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Configure Docker
        run: gcloud auth configure-docker "$GCP_REGION-docker.pkg.dev" --quiet

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=$GCP_PROJECT_ID-terraform-state" \
            -backend-config="prefix=terraform/state/$PROJECT_NAME"

      - name: Create Artifact Registry
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -target=google_artifact_registry_repository.backend \
            -var="gcp_project_id=$GCP_PROJECT_ID" \
            -var="vercel_api_token=$VERCEL_API_TOKEN" \
            -var="cloudflare_api_token=$CLOUDFLARE_API_TOKEN" \
            -var="cloudflare_account_id=$CLOUDFLARE_ACCOUNT_ID" \
            -var="upstash_email=$UPSTASH_EMAIL" \
            -var="upstash_api_key=$UPSTASH_API_KEY" \
            -var="redis_url_override=$UPSTASH_REDIS_URL"

{{BACKEND_IMAGE_STEPS}}

      - name: Build runtime Terraform vars
        run: node scripts/build-runtime-tfvars.mjs

      - name: Terraform apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="gcp_project_id=$GCP_PROJECT_ID" \
            -var="vercel_api_token=$VERCEL_API_TOKEN" \
            -var="cloudflare_api_token=$CLOUDFLARE_API_TOKEN" \
            -var="cloudflare_account_id=$CLOUDFLARE_ACCOUNT_ID" \
            -var="upstash_email=$UPSTASH_EMAIL" \
            -var="upstash_api_key=$UPSTASH_API_KEY" \
            -var="redis_url_override=$UPSTASH_REDIS_URL"

{{FRONTEND_DEPLOY_STEPS}}

      - name: Outputs
        working-directory: terraform
        run: terraform output
